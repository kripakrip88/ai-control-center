<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МеталлПро ERP — Метизы</title>
<script src="nav.js"></script>
<style>
.controls{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.ctrl-search{position:relative;flex:1;min-width:200px;max-width:360px;}
.ctrl-search input{padding-left:30px;}
.ctrl-search .ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--txts);pointer-events:none;}
.count-lbl{font-size:12px;color:var(--txts);margin-left:auto;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.cat-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--brd);}
.cat-row:last-child{border-bottom:none;}
</style>
</head>
<body>
<div class="shell">
  <aside class="sb" id="erp-nav"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Метизы</div>
      <div class="topbar-right">
        <button class="btn btn-secondary" onclick="openCatsModal()">⚙ Категории</button>
        <button class="btn btn-primary" onclick="openCreate()">+ Добавить метиз</button>
      </div>
    </div>
    <div class="content">
      <div class="controls">
        <div class="ctrl-search">
          <span class="ico">🔍</span>
          <input type="text" id="search-inp" placeholder="Поиск по коду или названию..." oninput="onSearch(this.value)">
        </div>
        <span class="count-lbl" id="mat-count"></span>
      </div>
      <div class="filter-bar" id="cat-filter"></div>
      <div class="card">
        <table>
          <thead>
            <tr><th>Код</th><th>Название</th><th>Категория</th><th>ГОСТ</th><th>Класс прочности</th><th>кг/шт</th><th>Единица</th><th></th></tr>
          </thead>
          <tbody id="mat-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Fastener form modal -->
<div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Добавить метиз</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="section-sep">Идентификация</div>
      <div class="grid2">
        <div class="field"><label>Код *</label><input type="text" id="f-code" placeholder="BOLT-M8x30"></div>
        <div class="field">
          <label>Категория</label>
          <select id="f-category"><option value="">— не указана —</option></select>
        </div>
      </div>
      <div class="field"><label>Название *</label><input type="text" id="f-name" placeholder="Болт М8×30 гр.8.8"></div>

      <div class="section-sep">Параметры метиза</div>
      <div class="grid2">
        <div class="field"><label>ГОСТ / Стандарт</label><input type="text" id="f-standard" placeholder="ГОСТ 7798-70"></div>
        <div class="field"><label>Класс прочности</label><input type="text" id="f-strength" placeholder="8.8, 10.9, А2..."></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Вес, кг/шт</label><input type="number" id="f-unitkg" placeholder="0.0320" step="0.0001" min="0"></div>
        <div class="field">
          <label>Единица учёта</label>
          <select id="f-pieceunit">
            <option value="pcs">шт — штука</option>
            <option value="set">компл. — комплект</option>
            <option value="pack">упак. — упаковка</option>
            <option value="pair">пара</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="save-btn" onclick="submitForm()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Category manager modal -->
<div id="modal-cats-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeCatsModal()">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <div class="modal-title">Категории метизов</div>
      <button class="modal-close" onclick="closeCatsModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="cats-list"></div>
      <div style="margin-top:14px;display:flex;gap:6px">
        <input type="text" id="new-cat-name" placeholder="Название новой категории...">
        <button class="btn btn-primary btn-sm" style="white-space:nowrap" onclick="addCategory()">+ Добавить</button>
      </div>
    </div>
  </div>
</div>

<script>
ERP.init('fasteners');

var PIECE_UNIT_LABELS = { pcs:'шт', set:'компл.', pack:'упак.', pair:'пара' };

var materials = [], categories = [], curCatId = '', editingId = null, searchTimer = null;

async function init() {
  try {
    var results = await Promise.all([
      ERP.authFetch('/api/material-categories?domain=FASTENER').then(function(r){ return r.json(); }),
      ERP.authFetch('/api/materials?materialDomain=FASTENER').then(function(r){ return r.json(); }),
    ]);
    categories = results[0];
    materials  = results[1];
    renderCats();
    renderTable();
  } catch(e) { ERP.toast('Ошибка загрузки: ' + e.message, 'error'); }
}

function renderCats() {
  var el = document.getElementById('cat-filter');
  el.innerHTML = '<button class="filter-pill'+(curCatId?'':' on')+'" onclick="setFilter(\'\')">Все</button>' +
    categories.map(function(c){
      return '<button class="filter-pill'+(curCatId===c.id?' on':'')+'" onclick="setFilter(\''+c.id+'\')">'+ERP.esc(c.name)+'</button>';
    }).join('');
}

function setFilter(catId) { curCatId = catId; renderCats(); loadMaterials(); }

function onSearch(q) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function(){ loadMaterials(q); }, 300);
}

async function loadMaterials(search) {
  if (search === undefined) search = document.getElementById('search-inp').value;
  var p = new URLSearchParams({ materialDomain: 'FASTENER' });
  if (search)   p.set('search', search);
  if (curCatId) p.set('categoryId', curCatId);
  try {
    var r = await ERP.authFetch('/api/materials?' + p);
    materials = await r.json();
    renderTable();
  } catch(e) { ERP.toast('Ошибка: ' + e.message, 'error'); }
}

function renderTable() {
  var el = document.getElementById('mat-tbody');
  document.getElementById('mat-count').textContent = materials.length + ' позиций';
  if (!materials.length) {
    el.innerHTML = '<tr><td colspan="8"><div class="empty">Метизов не найдено</div></td></tr>';
    return;
  }
  el.innerHTML = materials.map(function(m){
    var geo = m.geometry || {};
    var cat = findCat(m.categoryId);
    var unitkg = geo.unitWeightKg ? Number(geo.unitWeightKg).toFixed(4) + ' кг' : '—';
    var unit = PIECE_UNIT_LABELS[m.pieceUnit] || m.pieceUnit || 'шт';
    return '<tr class="clickable" onclick="openEdit(\''+m.id+'\')">' +
      '<td><span class="mono" style="color:var(--blue);font-weight:700">'+ERP.esc(m.code)+'</span></td>' +
      '<td>'+ERP.esc(m.name)+'</td>' +
      '<td style="color:var(--txts);font-size:12px">'+ERP.esc(cat?cat.name:'—')+'</td>' +
      '<td style="color:var(--txts);font-size:12px">'+ERP.esc(m.standard||'—')+'</td>' +
      '<td style="font-size:12px"><span class="mono">'+ERP.esc(m.strengthClass||'—')+'</span></td>' +
      '<td class="mono" style="color:var(--txts)">'+unitkg+'</td>' +
      '<td style="font-size:12px">'+unit+'</td>' +
      '<td style="white-space:nowrap">' +
        '<button class="btn btn-secondary btn-xs" style="margin-right:4px" onclick="event.stopPropagation();openEdit(\''+m.id+'\')">Ред.</button>' +
        '<button class="btn btn-danger btn-xs" onclick="event.stopPropagation();archiveMat(\''+m.id+'\')">Архив.</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

function findCat(id) {
  for (var i = 0; i < categories.length; i++) {
    if (categories[i].id === id) return categories[i];
  }
  return null;
}

function populateCategorySelect() {
  var sel = document.getElementById('f-category');
  sel.innerHTML = '<option value="">— не указана —</option>';
  categories.forEach(function(c){
    sel.innerHTML += '<option value="'+c.id+'">'+ERP.esc(c.name)+'</option>';
  });
}

function openCreate() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Добавить метиз';
  resetForm();
  populateCategorySelect();
  document.getElementById('modal-bg').style.display = 'flex';
}

async function openEdit(id) {
  editingId = id;
  document.getElementById('modal-title').textContent = 'Редактировать метиз';
  populateCategorySelect();
  try {
    var r = await ERP.authFetch('/api/materials/' + id);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var m = await r.json();
    fillForm(m);
    document.getElementById('modal-bg').style.display = 'flex';
  } catch(e) { ERP.toast('Ошибка: ' + e.message, 'error'); }
}

function fillForm(m) {
  var geo = m.geometry || {};
  document.getElementById('f-code').value     = m.code||'';
  document.getElementById('f-name').value     = m.name||'';
  document.getElementById('f-category').value = m.categoryId||'';
  document.getElementById('f-standard').value = m.standard||'';
  document.getElementById('f-strength').value = m.strengthClass||'';
  document.getElementById('f-unitkg').value   = geo.unitWeightKg ? Number(geo.unitWeightKg) : '';
  document.getElementById('f-pieceunit').value = m.pieceUnit||'pcs';
}

function resetForm() {
  ['f-code','f-name','f-standard','f-strength','f-unitkg'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('f-category').value = '';
  document.getElementById('f-pieceunit').value = 'pcs';
}

function closeModal() {
  document.getElementById('modal-bg').style.display = 'none';
}

async function submitForm() {
  var code = document.getElementById('f-code').value.trim();
  var name = document.getElementById('f-name').value.trim();
  if (!code || !name) { ERP.toast('Заполните обязательные поля (*)','error'); return; }
  var body = {
    code, name,
    materialDomain: 'FASTENER',
    categoryId:    document.getElementById('f-category').value || null,
    standard:      document.getElementById('f-standard').value || null,
    strengthClass: document.getElementById('f-strength').value || null,
    unitWeightKg:  document.getElementById('f-unitkg').value || null,
    pieceUnit:     document.getElementById('f-pieceunit').value || 'pcs',
  };
  var btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Сохранение...';
  try {
    var url = editingId ? '/api/materials/'+editingId : '/api/materials';
    var r = await ERP.authFetch(url, { method: editingId?'PUT':'POST', body: JSON.stringify(body) });
    if (!r.ok) { var e = await r.json().catch(function(){return {};}); throw new Error(e.error||'HTTP '+r.status); }
    localStorage.setItem('materials_changed', Date.now());
    closeModal();
    await loadMaterials();
    ERP.toast(editingId ? 'Метиз обновлён' : 'Метиз добавлен', 'success');
  } catch(e) { ERP.toast('Ошибка: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Сохранить'; }
}

async function archiveMat(id) {
  if (!confirm('Архивирование скроет метиз из новых заказов. Продолжить?')) return;
  try {
    var r = await ERP.authFetch('/api/materials/'+id, { method: 'DELETE' });
    if (!r.ok) { var e = await r.json().catch(function(){return {};}); throw new Error(e.error||'HTTP '+r.status); }
    localStorage.setItem('materials_changed', Date.now());
    await loadMaterials();
    ERP.toast('Метиз архивирован', 'success');
  } catch(e) { ERP.toast('Ошибка: ' + e.message, 'error'); }
}

// ── Category manager ──────────────────────────────────────────────────────────
function openCatsModal() {
  renderCatsList();
  document.getElementById('new-cat-name').value = '';
  document.getElementById('modal-cats-bg').style.display = 'flex';
}

function closeCatsModal() {
  document.getElementById('modal-cats-bg').style.display = 'none';
}

function renderCatsList() {
  var el = document.getElementById('cats-list');
  if (!categories.length) {
    el.innerHTML = '<div class="empty" style="padding:16px 0">Категорий нет. Создайте первую ниже.</div>';
    return;
  }
  el.innerHTML = categories.map(function(c) {
    var safeName = c.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return '<div class="cat-row">' +
      '<span style="flex:1;font-size:13px">' + ERP.esc(c.name) + '</span>' +
      '<button class="btn btn-secondary btn-xs" onclick="renameCat(\'' + c.id + '\',\'' + safeName + '\')">Ред.</button>' +
      '<button class="btn btn-danger btn-xs" onclick="deleteCat(\'' + c.id + '\')">✕</button>' +
    '</div>';
  }).join('');
}

async function addCategory() {
  var name = document.getElementById('new-cat-name').value.trim();
  if (!name) return;
  var slug = name.toLowerCase().replace(/[^a-zа-яё0-9]+/gi, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') + '-' + Date.now().toString(36);
  try {
    var r = await ERP.authFetch('/api/material-categories', {
      method: 'POST', body: JSON.stringify({ slug, name, domain: 'FASTENER' }),
    });
    if (!r.ok) { var e = await r.json().catch(function(){return {};}); throw new Error(e.error||'Ошибка'); }
    var c = await r.json();
    categories.push(c);
    document.getElementById('new-cat-name').value = '';
    renderCatsList(); renderCats(); populateCategorySelect();
    ERP.toast('Категория создана', 'success');
  } catch(e) { ERP.toast('Ошибка: ' + e.message, 'error'); }
}

async function renameCat(id, currentName) {
  var name = prompt('Переименовать категорию:', currentName);
  if (!name || name === currentName) return;
  try {
    var r = await ERP.authFetch('/api/material-categories/' + id, {
      method: 'PUT', body: JSON.stringify({ name }),
    });
    if (!r.ok) throw new Error('Ошибка');
    categories = categories.map(function(c){ return c.id===id ? Object.assign({},c,{name:name}) : c; });
    renderCatsList(); renderCats(); populateCategorySelect();
    ERP.toast('Переименовано', 'success');
  } catch(e) { ERP.toast('Ошибка: ' + e.message, 'error'); }
}

async function deleteCat(id) {
  if (!confirm('Удалить категорию? Метизы останутся без категории.')) return;
  try {
    var r = await ERP.authFetch('/api/material-categories/' + id, { method: 'DELETE' });
    if (!r.ok) throw new Error('Ошибка');
    categories = categories.filter(function(c){ return c.id!==id; });
    if (curCatId === id) curCatId = '';
    renderCatsList(); renderCats(); populateCategorySelect();
    ERP.toast('Категория удалена', 'success');
  } catch(e) { ERP.toast('Ошибка: ' + e.message, 'error'); }
}

document.addEventListener('keydown', function(e){ if (e.key==='Escape') { closeModal(); closeCatsModal(); } });
document.getElementById('new-cat-name').addEventListener('keydown', function(e){ if(e.key==='Enter') addCategory(); });
init();
</script>
</body>
</html>
