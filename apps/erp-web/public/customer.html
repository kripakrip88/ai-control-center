<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МеталлПро ERP — Карточка клиента</title>
<script src="nav.js"></script>
<style>
.layout{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start;}
.info-card{padding:16px;}
.info-title{font-weight:700;font-size:15px;margin-bottom:12px;}
.info-row{display:flex;flex-direction:column;gap:2px;margin-bottom:10px;}
.info-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--txts);}
.info-value{font-size:13px;}
.section-card{background:var(--panel);border:1px solid var(--brd);border-radius:8px;margin-top:12px;}
.section-head{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;}
.section-head-title{font-weight:700;font-size:12.5px;}
.contact-item{padding:10px 14px;border-bottom:1px solid var(--brd);}
.contact-item:last-child{border-bottom:none;}
.contact-name{font-weight:600;}
.contact-meta{font-size:11.5px;color:var(--txts);}
.tabs{display:flex;border-bottom:1px solid var(--brd);}
.tab{padding:10px 18px;font-size:12.5px;font-weight:600;color:var(--txts);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;}
.tab.on{color:var(--green);border-bottom-color:var(--green);}
.tab-pane{display:none;}
.tab-pane.on{display:block;}
.interaction-item{padding:12px 14px;border-bottom:1px solid var(--brd);}
.interaction-item:last-child{border-bottom:none;}
.interaction-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.interaction-subject{font-weight:600;font-size:13px;}
.interaction-body{font-size:12.5px;color:var(--txts);white-space:pre-wrap;}
.interaction-meta{font-size:11px;color:var(--txts);margin-top:4px;}
</style>
</head>
<body>
<div class="shell">
  <aside class="sb" id="erp-nav"></aside>
  <div class="main">
    <div class="topbar">
      <button class="btn btn-secondary btn-sm" onclick="window.location.href='crm.html'">← Клиенты</button>
      <div class="topbar-title" id="page-title">Клиент</div>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" onclick="openContactModal()">+ Контакт</button>
        <button class="btn btn-primary btn-sm" onclick="openRfqModal()">+ Заявка на КП</button>
      </div>
    </div>
    <div class="content">
      <div id="loading" style="text-align:center;padding:40px;color:var(--txts)">Загрузка...</div>
      <div id="customer-layout" class="layout" style="display:none">
        <div>
          <div class="card info-card">
            <div class="info-title" id="c-name"></div>
            <div class="info-row"><div class="info-label">ИНН</div><div class="info-value" id="c-inn"></div></div>
            <div class="info-row"><div class="info-label">Email</div><div class="info-value" id="c-email"></div></div>
            <div class="info-row"><div class="info-label">Телефон</div><div class="info-value" id="c-phone"></div></div>
            <div class="info-row"><div class="info-label">Сайт</div><div class="info-value" id="c-website"></div></div>
            <div class="info-row"><div class="info-label">Приоритет</div><div class="info-value" id="c-priority"></div></div>
          </div>
          <div class="section-card">
            <div class="section-head">
              <div class="section-head-title">Контакты</div>
              <button class="btn btn-secondary btn-xs" onclick="openContactModal()">+ Контакт</button>
            </div>
            <div id="contacts-list"></div>
          </div>
        </div>
        <div class="card" style="overflow:hidden">
          <div class="tabs">
            <div class="tab on" onclick="switchTab('orders',this)">Заказы</div>
            <div class="tab" onclick="switchTab('interactions',this)">История</div>
          </div>
          <div class="tab-pane on" id="tab-orders">
            <table>
              <thead><tr><th>Номер</th><th>Объект</th><th>Статус</th><th>Дата</th></tr></thead>
              <tbody id="orders-tbody"></tbody>
            </table>
          </div>
          <div class="tab-pane" id="tab-interactions">
            <div id="interactions-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="contact-modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeContactModal()">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Добавить контакт</div><button class="modal-close" onclick="closeContactModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Имя *</label><input type="text" id="ct-name" placeholder="Иван Иванов"></div>
      <div class="field"><label>Должность</label><input type="text" id="ct-position" placeholder="Менеджер по закупкам"></div>
      <div class="grid2">
        <div class="field"><label>Email</label><input type="email" id="ct-email" placeholder="ivan@company.ru"></div>
        <div class="field"><label>Телефон</label><input type="tel" id="ct-phone" placeholder="+7 (999) 000-00-00"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeContactModal()">Отмена</button>
      <button class="btn btn-primary" id="ct-save-btn" onclick="saveContact()">Добавить</button>
    </div>
  </div>
</div>

<div id="rfq-modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeRfqModal()">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Заявка на КП</div><button class="modal-close" onclick="closeRfqModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Название объекта *</label><input type="text" id="rfq-title" placeholder="Металлоконструкции склада №3"></div>
      <div class="field"><label>Примечание</label><textarea id="rfq-desc" placeholder="Дополнительная информация..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeRfqModal()">Отмена</button>
      <button class="btn btn-primary" id="rfq-save-btn" onclick="saveRfq()">Создать заявку</button>
    </div>
  </div>
</div>

<script>
ERP.init('crm');

var params = new URLSearchParams(location.search);
var customerId = params.get('id');
var customer = null;

function priorityBadge(p) {
  var map = { VIP:'b-vip', HIGH:'b-high', NORMAL:'b-normal', LOW:'b-low' };
  return '<span class="badge '+(map[p]||'b-normal')+'">'+p+'</span>';
}
var STATUS_RU = {DRAFT:'Новый запрос',QUOTATION:'На рассмотрении',AWAITING_APPROVAL:'Расчёт цены',APPROVED:'КП отправлено',PRODUCTION:'В производстве',COMPLETED:'Готово',DELIVERED:'Сдан',CANCELLED:'Отменён'};
function statusBadge(s) {
  var map = { DRAFT:'b-draft', QUOTATION:'b-quotation', AWAITING_APPROVAL:'b-awaiting', APPROVED:'b-approved', PRODUCTION:'b-production', COMPLETED:'b-completed', DELIVERED:'b-delivered', CANCELLED:'b-cancelled' };
  return '<span class="badge '+(map[s]||'b-draft')+'">'+(STATUS_RU[s]||s)+'</span>';
}
function typeBadge(t) {
  var map = { EMAIL:'b-email', CALL:'b-call', MEETING:'b-meeting', NOTE:'b-note' };
  return '<span class="badge '+(map[t]||'b-note')+'">'+t+'</span>';
}
function dirBadge(d) {
  return d==='INBOUND' ? '<span class="badge b-inbound">входящее</span>' : '<span class="badge b-outbound">исходящее</span>';
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
}

async function loadCustomer() {
  if (!customerId) { document.getElementById('loading').textContent = 'Не указан ID клиента'; return; }
  try {
    var r = await ERP.authFetch('/api/customers/' + customerId);
    if (r.status === 404) { document.getElementById('loading').textContent = 'Клиент не найден'; return; }
    customer = await r.json();
    renderCustomer();
  } catch(e) {
    document.getElementById('loading').textContent = 'Ошибка загрузки';
  }
}

function renderCustomer() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('customer-layout').style.display = 'grid';
  document.getElementById('page-title').textContent = customer.name;
  document.title = 'МеталлПро ERP — ' + customer.name;
  document.getElementById('c-name').textContent = customer.name;
  document.getElementById('c-inn').textContent = customer.inn || '—';
  document.getElementById('c-email').textContent = customer.email || '—';
  document.getElementById('c-phone').textContent = customer.phone || '—';
  document.getElementById('c-website').innerHTML = customer.website
    ? '<a href="'+ERP.esc(customer.website)+'" target="_blank" rel="noopener" style="color:var(--blue)">'+ERP.esc(customer.website)+'</a>' : '—';
  document.getElementById('c-priority').innerHTML = priorityBadge(customer.priority);
  renderContacts(customer.contacts || []);
  renderOrders(customer.orders || []);
  renderInteractions(customer.interactions || []);
}

function renderContacts(list) {
  var el = document.getElementById('contacts-list');
  if (!list.length) { el.innerHTML = '<div class="empty" style="padding:16px">Контактов нет</div>'; return; }
  el.innerHTML = list.map(function(c){
    return '<div class="contact-item">' +
      '<div class="contact-name">'+ERP.esc(c.name)+(c.position?' <span style="font-weight:400;color:var(--txts)">· '+ERP.esc(c.position)+'</span>':'')+'</div>' +
      (c.email ? '<div class="contact-meta">'+ERP.esc(c.email)+'</div>' : '') +
      (c.phone ? '<div class="contact-meta">'+ERP.esc(c.phone)+'</div>' : '') +
    '</div>';
  }).join('');
}

function renderOrders(list) {
  var tbody = document.getElementById('orders-tbody');
  if (!list.length) { tbody.innerHTML = '<tr><td colspan="4"><div class="empty">Заказов нет</div></td></tr>'; return; }
  tbody.innerHTML = list.map(function(o){
    return '<tr class="clickable" onclick="window.location.href=\'orders.html\'">' +
      '<td class="mono" style="color:var(--blue);font-weight:700">'+ERP.esc(o.orderNumber)+'</td>' +
      '<td>'+ERP.esc(o.title)+'</td>' +
      '<td>'+statusBadge(o.status)+'</td>' +
      '<td class="mono" style="color:var(--txts);font-size:11px">'+fmtDate(o.createdAt)+'</td>' +
    '</tr>';
  }).join('');
}

function renderInteractions(list) {
  var el = document.getElementById('interactions-list');
  if (!list.length) { el.innerHTML = '<div class="empty">Взаимодействий нет</div>'; return; }
  el.innerHTML = list.map(function(i){
    return '<div class="interaction-item">' +
      '<div class="interaction-head">'+typeBadge(i.type)+dirBadge(i.direction)+(i.contact?'<span style="font-size:11.5px;color:var(--txts)">'+ERP.esc(i.contact.name)+'</span>':'')+'</div>' +
      (i.subject ? '<div class="interaction-subject">'+ERP.esc(i.subject)+'</div>' : '') +
      (i.body ? '<div class="interaction-body">'+ERP.esc(i.body)+'</div>' : '') +
      '<div class="interaction-meta">'+fmtDate(i.createdAt)+(i.createdBy?' · '+ERP.esc(i.createdBy.firstName+' '+i.createdBy.lastName):'')+'</div>' +
    '</div>';
  }).join('');
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('on'); });
  btn.classList.add('on');
  document.getElementById('tab-orders').classList.toggle('on', name==='orders');
  document.getElementById('tab-interactions').classList.toggle('on', name==='interactions');
}

function openContactModal() {
  ['ct-name','ct-position','ct-email','ct-phone'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('contact-modal-bg').style.display = 'flex';
  setTimeout(function(){ document.getElementById('ct-name').focus(); }, 50);
}
function closeContactModal() { document.getElementById('contact-modal-bg').style.display = 'none'; }

async function saveContact() {
  var name = document.getElementById('ct-name').value.trim();
  if (!name) { ERP.toast('Введите имя контакта', 'error'); return; }
  var btn = document.getElementById('ct-save-btn');
  btn.disabled = true;
  try {
    var r = await ERP.authFetch('/api/customers/' + customerId + '/contacts', {
      method: 'POST',
      body: JSON.stringify({
        name: name,
        position: document.getElementById('ct-position').value.trim() || null,
        email:    document.getElementById('ct-email').value.trim() || null,
        phone:    document.getElementById('ct-phone').value.trim() || null,
      }),
    });
    var data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Ошибка');
    closeContactModal();
    ERP.toast('Контакт добавлен', 'success');
    loadCustomer();
  } catch(e) { ERP.toast(e.message, 'error'); }
  finally { btn.disabled = false; }
}

function openRfqModal() {
  document.getElementById('rfq-title').value = '';
  document.getElementById('rfq-desc').value = '';
  document.getElementById('rfq-modal-bg').style.display = 'flex';
  setTimeout(function(){ document.getElementById('rfq-title').focus(); }, 50);
}
function closeRfqModal() { document.getElementById('rfq-modal-bg').style.display = 'none'; }

async function saveRfq() {
  var title = document.getElementById('rfq-title').value.trim();
  if (!title) { ERP.toast('Введите название объекта', 'error'); return; }
  var btn = document.getElementById('rfq-save-btn');
  btn.disabled = true;
  try {
    var r = await ERP.authFetch('/api/orders', {
      method: 'POST',
      body: JSON.stringify({
        orderNumber:  'RFQ-' + Date.now(),
        customerName: customer.name,
        customerId:   customer.id,
        title: title,
        description: document.getElementById('rfq-desc').value.trim() || null,
      }),
    });
    var data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Ошибка');
    closeRfqModal();
    ERP.toast('Заявка создана', 'success');
    window.location.href = 'simulator.html?orderId=' + data.id;
  } catch(e) { ERP.toast(e.message, 'error'); }
  finally { btn.disabled = false; }
}

document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') { closeContactModal(); closeRfqModal(); }
});

loadCustomer();
</script>
</body>
</html>
