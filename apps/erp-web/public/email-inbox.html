<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МеталлПро ERP — Email Copilot</title>
<script src="nav.js"></script>
<style>
/* ── INBOX LAYOUT ─────────────────────────────────────────── */
.inbox-layout{position:fixed;top:var(--topbarh);left:var(--sbw);right:0;bottom:0;display:flex;overflow:hidden;}

/* ── LEFT PANEL: folders + list ──────────────────────────── */
.list-panel{width:300px;flex-shrink:0;border-right:1px solid var(--brd);display:flex;flex-direction:column;background:var(--panel);overflow:hidden;min-height:0;position:relative;}
/* Panel resize handle */
.list-resizer{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:20;background:transparent;transition:background .15s;}
.list-resizer:hover,.list-resizer.dragging{background:rgba(59,130,246,.35);}

.folder-nav{padding:8px;border-bottom:1px solid var(--brd);flex-shrink:0;}
.folder-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;font-size:12.5px;color:var(--txts);cursor:pointer;transition:background .1s;user-select:none;}
.folder-item:hover{background:var(--hov);color:var(--txt);}
.folder-item.on{background:rgba(59,130,246,.1);color:var(--blue);font-weight:600;}
.folder-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.folder-label{flex:1;}
.folder-count{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--blue);color:#fff;flex-shrink:0;}
.folder-count.grey{background:var(--card);color:var(--txts);}

.list-filters{display:flex;gap:4px;padding:8px;border-bottom:1px solid var(--brd);flex-wrap:wrap;flex-shrink:0;}

.mail-list{flex:1;overflow-y:auto;min-height:0;}
.mail-list::-webkit-scrollbar{width:3px;}
.mail-list::-webkit-scrollbar-thumb{background:var(--brdl);border-radius:3px;}
.mail-item{padding:10px 12px;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .1s;position:relative;}
.mail-item:hover{background:var(--hov);}
.mail-item.on{background:rgba(59,130,246,.07);border-left:3px solid var(--blue);}
.mail-item.on .mail-from-name{color:var(--txt);}
.mail-unread-dot{position:absolute;left:3px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--blue);}
/* Avatar + content row */
.mail-item-inner{display:flex;align-items:flex-start;gap:9px;}
.mail-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:.3px;margin-top:1px;}
.mail-item-content{flex:1;min-width:0;}
.mail-from{font-weight:600;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:4px;}
.mail-from-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt);}
.mail-time{font-size:10.5px;color:var(--txts);flex-shrink:0;}
.mail-subject{font-size:11.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txts);}
.mail-preview{font-size:11px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txtm);}
.mail-badges{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.empty-list{text-align:center;padding:40px 16px;color:var(--txts);font-size:13px;}

/* ── DETAIL PANEL: 3-zone flex column ───────────────────── */
.detail-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.detail-empty{display:flex;align-items:center;justify-content:center;flex:1;color:var(--txts);font-size:14px;}

/* Zone 1: sticky header */
.detail-header{background:var(--panel);border-bottom:1px solid var(--brd);padding:14px 20px;flex-shrink:0;}
.detail-subject{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--txt);}
.detail-meta-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;}
.detail-meta-from{font-size:12px;color:var(--txts);}
.detail-meta-from strong{color:var(--txt);}
.detail-meta-time{font-size:11.5px;color:var(--txtm);}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.detail-hdr-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center;}

/* Zone 2: scrollable content */
.detail-scroll{flex:1;overflow-y:auto;padding:16px 20px;min-height:0;}
.detail-scroll::-webkit-scrollbar{width:4px;}
.detail-scroll::-webkit-scrollbar-thumb{background:var(--brdl);border-radius:4px;}

.section-block{background:var(--panel);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-bottom:10px;}
.section-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txtm);margin-bottom:8px;}
.summary-text{font-size:13px;line-height:1.6;}

/* Email body: main text vs history */
.body-main{font-size:12.5px;line-height:1.75;color:var(--txt);white-space:pre-wrap;word-break:break-word;}
/* HTML email body (tables, rich text) */
.body-html{white-space:normal;}
.body-html table{border-collapse:collapse;width:100%;margin:8px 0;font-size:12px;}
.body-html td,.body-html th{border:1px solid var(--brd);padding:6px 10px;text-align:left;vertical-align:top;}
.body-html th{background:var(--panel);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--txts);}
.body-html tr:hover td{background:var(--hov);}
.body-html p{margin:0 0 8px;}
.body-html br{display:block;margin:2px 0;}
.history-toggle{display:flex;align-items:center;gap:6px;margin-top:12px;padding:6px 0;cursor:pointer;color:var(--txts);font-size:11.5px;border-top:1px dashed var(--brd);user-select:none;transition:color .12s;}
.history-toggle:hover{color:var(--txt);}
.history-toggle-icon{font-size:9px;transition:transform .15s;}
.history-toggle.open .history-toggle-icon{transform:rotate(90deg);}
.history-body{display:none;margin-top:8px;}
.history-body.open{display:block;}
.hist-msg{border:1px solid var(--brd);border-radius:6px;margin-top:8px;overflow:hidden;background:var(--bg);}
.hist-msg-from{font-size:11px;font-weight:600;color:var(--txts);background:var(--card);padding:5px 12px;border-bottom:1px solid var(--brd);}
.hist-msg-body{font-size:11.5px;color:var(--txts);white-space:pre-wrap;word-break:break-word;line-height:1.6;padding:8px 12px;max-height:100px;overflow:hidden;}
.hist-msg-body.expanded{max-height:none;}
.hist-msg-expand{font-size:11px;color:var(--blue);cursor:pointer;padding:3px 12px 5px;background:var(--card);border-top:1px solid var(--brd);display:block;user-select:none;}
.hist-msg-expand:hover{background:var(--hov);}

/* Attachments */
.attach-list{display:flex;flex-direction:column;gap:5px;}
.attach-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card);border:1px solid var(--brd);border-radius:6px;font-size:12px;transition:background .1s;}
.attach-item:hover{background:var(--hov);}
.attach-icon{font-size:16px;flex-shrink:0;}
.attach-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:var(--txt);}
.attach-size{font-size:10.5px;color:var(--txts);flex-shrink:0;font-family:var(--ffm);}
.attach-dl{flex-shrink:0;color:var(--blue);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;border:1px solid rgba(59,130,246,.3);background:rgba(59,130,246,.08);transition:background .1s;text-decoration:none;}
.attach-dl:hover{background:rgba(59,130,246,.18);}

/* Extracted items */
.extracted-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.extracted-item{background:var(--card);border-radius:5px;padding:8px 10px;}
.extracted-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);margin-bottom:2px;}
.extracted-value{font-size:13px;color:var(--txt);}

/* Draft variants */
.drafts-list{display:flex;flex-direction:column;gap:8px;}
.draft-card{border:1px solid var(--brd);border-radius:7px;padding:12px;cursor:pointer;transition:all .12s;background:var(--card);}
.draft-card:hover{border-color:var(--brdl);background:var(--hov);}
.draft-card.on{border-color:var(--blue);background:rgba(59,130,246,.06);}
.draft-strategy{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--blue);margin-bottom:5px;}
.draft-card:not(.on) .draft-strategy{color:var(--txts);}
.draft-preview{font-size:12px;line-height:1.6;color:var(--txt);white-space:pre-wrap;word-break:break-word;max-height:80px;overflow:hidden;mask-image:linear-gradient(to bottom,#000 60%,transparent);}
.draft-card.on .draft-preview{max-height:none;mask-image:none;}

/* Zone 3: sticky reply editor */
.reply-editor{flex-shrink:0;background:var(--panel);border-top:1px solid var(--brd);padding:12px 20px;}
.reply-editor-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txtm);margin-bottom:6px;}
#reply-textarea{width:100%;min-height:80px;max-height:200px;resize:vertical;background:var(--card);border:1px solid var(--brd);border-radius:6px;color:var(--txt);padding:9px 12px;font-size:12.5px;font-family:var(--ff);line-height:1.6;outline:none;transition:border-color .12s;}
#reply-textarea:focus{border-color:var(--blue);}
.reply-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center;}
.btn-reanalyze{margin-left:auto;}

/* Misc */
.spinner{display:inline-block;width:11px;height:11px;border:2px solid rgba(59,130,246,.3);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.last-update{font-size:11.5px;color:var(--txts);}
</style>
</head>
<body>
<div class="shell">
  <aside class="sb" id="erp-nav"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Email Copilot</div>
      <div class="topbar-right">
        <span class="last-update" id="last-update"></span>
        <button class="btn btn-secondary btn-sm" onclick="pollMail()">↻ Проверить почту</button>
      </div>
    </div>
    <div class="inbox-layout">

      <!-- ── LEFT PANEL ─────────────────────────────── -->
      <div class="list-panel">
        <!-- Folders -->
        <div class="folder-nav">
          <div class="folder-item on" id="folder-inbox" onclick="setFolder('pending',this)">
            <span class="folder-icon">📥</span>
            <span class="folder-label">Входящие</span>
            <span class="folder-count" id="fc-pending"></span>
          </div>
          <div class="folder-item" id="folder-replied" onclick="setFolder('replied',this)">
            <span class="folder-icon">✅</span>
            <span class="folder-label">Обработанные</span>
            <span class="folder-count grey" id="fc-replied"></span>
          </div>
          <div class="folder-item" id="folder-archived" onclick="setFolder('archived',this)">
            <span class="folder-icon">📁</span>
            <span class="folder-label">Архив</span>
            <span class="folder-count grey" id="fc-archived"></span>
          </div>
        </div>
        <!-- Filters within folder -->
        <div class="list-filters">
          <button class="filter-pill on" id="fp-all" onclick="setIntent('',this)">Все</button>
          <button class="filter-pill" onclick="setIntent('RFQ',this)">RFQ</button>
          <button class="filter-pill" onclick="setIntent('QUESTION',this)">Вопрос</button>
          <button class="filter-pill" onclick="setIntent('ORDER',this)">Заказ</button>
        </div>
        <!-- Mail list -->
        <div class="mail-list" id="mail-list"><div class="empty-list">Загрузка...</div></div>
        <!-- Panel resize handle -->
        <div class="list-resizer" onmousedown="startPanelResize(event)"></div>
      </div>

      <!-- ── DETAIL PANEL ───────────────────────────── -->
      <div class="detail-panel" id="detail-panel">
        <div class="detail-empty">Выберите письмо из списка</div>
      </div>
    </div>
  </div>
</div>

<script>
ERP.init('email');

// Запросы идут через erp-metal proxy → localhost:4000 (порт закрыт снаружи)
var AI_API = (window.AI_API_URL || '');
var currentFolder = 'pending';
var currentIntent = '';
var selectedId = null;
var messages = [];
var currentDrafts = [];

/* Read IDs — persisted to localStorage so they survive page reload */
var readIds = (function() {
  try { return new Set(JSON.parse(localStorage.getItem('erp_mail_read') || '[]')); } catch(_) { return new Set(); }
})();
function markRead(id) {
  readIds.add(id);
  var arr = Array.from(readIds);
  if (arr.length > 1000) arr = arr.slice(arr.length - 1000);
  readIds = new Set(arr);
  try { localStorage.setItem('erp_mail_read', JSON.stringify(arr)); } catch(_) {}
}

/* ── TIME FORMAT ────────────────────────────────────────── */
function fmtTime(d) {
  if (!d) return '';
  var dt = new Date(d), now = new Date();
  if (dt.toDateString() === now.toDateString())
    return dt.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
  var diff = now - dt;
  if (diff < 7 * 86400000)
    return dt.toLocaleDateString('ru-RU', { weekday:'short' });
  return dt.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit' });
}
function fmtFull(d) {
  if (!d) return '';
  return new Date(d).toLocaleString('ru-RU', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

/* ── BADGES ─────────────────────────────────────────────── */
function intentBadge(v) {
  if (!v) return '';
  var m = { RFQ:'b-rfq', ORDER:'b-order', QUESTION:'b-question', COMPLAINT:'b-complaint', SPAM:'b-spam', OTHER:'b-other' };
  return '<span class="badge '+(m[v]||'b-other')+'">'+v+'</span>';
}
function priorityBadge(v) {
  if (!v) return '';
  var labels = { critical:'СРОЧНО', urgent:'СРОЧНО', normal:'', low:'низкий' };
  var m = { critical:'b-danger', urgent:'b-urgent', normal:'b-normal', low:'b-low' };
  var lbl = labels[v] || v.toUpperCase();
  if (!lbl) return '';
  return '<span class="badge '+(m[v]||'b-normal')+'">'+lbl+'</span>';
}
function statusBadge(v) {
  if (!v) return '';
  var m = { pending:'b-pending', replied:'b-replied', archived:'b-archived' };
  var labels = { pending:'Новое', replied:'Отвечено', archived:'Архив' };
  return '<span class="badge '+(m[v]||'b-pending')+'">'+(labels[v]||v)+'</span>';
}

/* ── FOLDER & FILTER SWITCHING ──────────────────────────── */
function setFolder(status, el) {
  currentFolder = status;
  currentIntent = '';
  document.querySelectorAll('.folder-item').forEach(function(f){ f.classList.remove('on'); });
  el.classList.add('on');
  document.querySelectorAll('.filter-pill').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('fp-all').classList.add('on');
  loadMessages();
}

function setIntent(intent, btn) {
  currentIntent = intent;
  document.querySelectorAll('.filter-pill').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  loadMessages();
}

/* ── LOAD & RENDER LIST ─────────────────────────────────── */
async function loadMessages() {
  var list = document.getElementById('mail-list');
  list.innerHTML = '<div class="empty-list">Загрузка...</div>';
  try {
    var url = AI_API + '/api/email-copilot/inbox';
    var qs = [];
    if (currentFolder) qs.push('status=' + currentFolder);
    if (currentIntent) qs.push('intent=' + currentIntent);
    if (qs.length) url += '?' + qs.join('&');
    var r = await ERP.authFetch(url);
    var data = await r.json();
    messages = Array.isArray(data.messages) ? data.messages : (Array.isArray(data) ? data : []);
    renderList();
    updateLastUpdate();
    updateFolderCounts();
  } catch(e) {
    list.innerHTML = '<div class="empty-list">AI-сервис недоступен</div>';
  }
}

function renderList() {
  var list = document.getElementById('mail-list');
  if (!messages.length) {
    list.innerHTML = '<div class="empty-list">Писем нет</div>';
    return;
  }
  list.innerHTML = messages.map(function(m) {
    var isNew = m.status === 'pending' && !readIds.has(m.id);
    var preview = (m.bodyText || '').replace(/\s+/g, ' ').slice(0, 80);
    var initials = senderInitials(m.fromName, m.fromAddress);
    var bgColor  = avatarColor(m.fromAddress || m.fromName || m.id);
    return '<div class="mail-item'+(m.id===selectedId?' on':'')+'" onclick="selectMessage(\''+m.id+'\')">' +
      (isNew ? '<div class="mail-unread-dot"></div>' : '') +
      '<div class="mail-item-inner">' +
        '<div class="mail-avatar" style="background:'+bgColor+'">'+ERP.esc(initials)+'</div>' +
        '<div class="mail-item-content">' +
          '<div class="mail-from">' +
            '<span class="mail-from-name">'+ERP.esc(m.fromName || m.fromAddress || '—')+'</span>' +
            '<span class="mail-time">'+fmtTime(m.receivedAt)+'</span>' +
          '</div>' +
          '<div class="mail-subject">'+ERP.esc(m.subject||'(без темы)')+'</div>' +
          (preview ? '<div class="mail-preview">'+ERP.esc(preview)+'</div>' : '') +
          '<div class="mail-badges">'+intentBadge(m.aiIntent)+priorityBadge(m.aiPriority)+'</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function updateFolderCounts() {
  var statuses = ['pending', 'replied', 'archived'];
  var ids = ['fc-pending', 'fc-replied', 'fc-archived'];
  try {
    var r = await ERP.authFetch(AI_API + '/api/email-copilot/inbox?status=pending&limit=999');
    var data = await r.json();
    var n = (Array.isArray(data.messages) ? data.messages : (Array.isArray(data) ? data : [])).length;
    var el = document.getElementById('fc-pending');
    if (el) { el.textContent = n || ''; el.style.display = n ? '' : 'none'; }
  } catch(e) {}
}

/* ── SELECT MESSAGE ─────────────────────────────────────── */
function selectMessage(id) {
  selectedId = id;
  markRead(id);
  renderList();
  var msg = messages.find(function(m){ return m.id === id; });
  if (msg) renderDetail(msg);
}

/* ── SENDER AVATAR ──────────────────────────────────────── */
var AVATAR_COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#14b8a6'];
function avatarColor(str) {
  var h = 0;
  for (var i = 0; i < (str||'').length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function senderInitials(name, email) {
  var src = name || email || '?';
  var parts = src.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return src.slice(0, 2).toUpperCase();
}

/* ── HTML email sanitizer ───────────────────────────────────── */
function hasHtmlContent(text) {
  return /<(table|thead|tbody|tr|td|th|div|p|ul|ol|li|br|b|strong|i|em|h[1-6])\b/i.test(text || '');
}
function sanitizeEmailHtml(html) {
  // Remove dangerous tags entirely
  html = html.replace(/<script[\s\S]*?<\/script>/gi, '');
  html = html.replace(/<style[\s\S]*?<\/style>/gi, '');
  html = html.replace(/<iframe[\s\S]*?<\/iframe>/gi, '');
  html = html.replace(/<(object|embed|form|input|button|select|textarea)[^>]*>[\s\S]*?<\/\1>/gi, '');
  // Remove event handler attributes
  html = html.replace(/\s+on[a-z]+\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]*)/gi, '');
  // Neutralise javascript: hrefs
  html = html.replace(/(href\s*=\s*)["']javascript:[^"']*["']/gi, '$1"#"');
  // Remove src="data:..." (can be used for tracking)
  html = html.replace(/\s+src\s*=\s*["']data:[^"']*["']/gi, '');
  return html;
}

/* ── FORMAT BODY: split main text from quoted history ────── */
function splitBody(text) {
  if (!text) return { main: '', quoted: '' };
  var lines = text.split('\n');
  var splitAt = lines.length;
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    if (/^From:/i.test(l) || /^От:/i.test(l) || /^_{5,}/.test(l) ||
        /^-{5,}/.test(l) || /^>{3,}/.test(l) ||
        /^On .+ wrote:/i.test(l) || /^\d{2}\.\d{2}\.\d{4}.*написал/i.test(l)) {
      splitAt = i;
      break;
    }
  }
  return {
    main:   lines.slice(0, splitAt).join('\n').trim(),
    quoted: lines.slice(splitAt).join('\n').trim()
  };
}

/* ── PARSE HISTORY INTO MESSAGE BLOCKS ─────────────────── */
function parseHistoryBlocks(quoted) {
  if (!quoted) return [];
  var HEADER = /^(From:|От:|On .+ wrote:|.{0,40}\d{2}\.\d{2}\.\d{4}.{0,40}написал)/i;
  var SEP    = /^[_\-]{5,}$/;
  var lines  = quoted.split('\n');
  var blocks = [], cur = null;
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    if (SEP.test(l)) {
      if (cur) blocks.push(cur);
      cur = { header: '', bodyLines: [] };
    } else if (HEADER.test(l)) {
      if (cur) blocks.push(cur);
      cur = { header: l, bodyLines: [] };
    } else if (cur) {
      cur.bodyLines.push(lines[i]);
    } else {
      cur = { header: '', bodyLines: [lines[i]] };
    }
  }
  if (cur && (cur.header || cur.bodyLines.some(function(ll){ return ll.trim(); }))) blocks.push(cur);
  return blocks;
}

/* ── RENDER DETAIL ──────────────────────────────────────── */
function renderDetail(msg) {
  currentDrafts = msg.aiDrafts || [];
  var panel = document.getElementById('detail-panel');
  var confidence = msg.aiConfidence != null ? Math.round(msg.aiConfidence * 100) : 0;
  // Prefer HTML body if available (richer formatting)
  var rawBody = msg.bodyHtml || msg.bodyText || '';
  var body = splitBody(rawBody);

  /* -- attachments -- */
  var attachHtml = '';
  if (msg.attachments && msg.attachments.length) {
    var items = msg.attachments.map(function(a) {
      var icon = a.contentType.indexOf('image/') === 0 ? '🖼'
               : a.contentType.indexOf('pdf') >= 0 ? '📄'
               : (a.contentType.indexOf('sheet') >= 0 || a.contentType.indexOf('excel') >= 0) ? '📊'
               : '📎';
      var size = a.size > 1048576 ? (a.size/1048576).toFixed(1)+' МБ'
               : a.size > 1024   ? Math.round(a.size/1024)+' КБ'
               : a.size+' Б';
      /* download link — will work once backend endpoint is ready */
      var dlHref = AI_API + '/api/email-copilot/attachment/' + msg.id + '/' + encodeURIComponent(a.filename);
      return '<div class="attach-item">' +
        '<span class="attach-icon">'+icon+'</span>' +
        '<span class="attach-name">'+ERP.esc(a.filename)+'</span>' +
        '<span class="attach-size">'+size+'</span>' +
        '<a class="attach-dl" href="'+dlHref+'" download="'+ERP.esc(a.filename)+'" target="_blank">⬇ скачать</a>' +
      '</div>';
    }).join('');
    attachHtml = '<div class="section-block"><div class="section-title">Вложения ('+msg.attachments.length+')</div><div class="attach-list">'+items+'</div></div>';
  }

  /* -- extracted items table -- */
  var itemsHtml = '';
  if (msg.aiExtracted && msg.aiExtracted.items && msg.aiExtracted.items.length) {
    itemsHtml = '<div class="section-block"><div class="section-title">Извлечённые позиции</div>' +
      '<table><thead><tr><th>Наименование</th><th>Кол-во</th><th>Ед.</th><th>Материал</th></tr></thead><tbody>' +
      msg.aiExtracted.items.map(function(item) {
        return '<tr><td>'+ERP.esc(item.name||item.description||'—')+'</td>' +
          '<td>'+ERP.esc(item.qty||item.quantity||'—')+'</td>' +
          '<td>'+ERP.esc(item.unit||'—')+'</td>' +
          '<td>'+ERP.esc(item.material||'—')+'</td></tr>';
      }).join('') + '</tbody></table></div>';
  }

  /* -- counterpart info -- */
  var ex = msg.aiExtracted || {};
  var counterpartHtml = '';
  if (ex.company || ex.contact || ex.deadline || ex.currency) {
    counterpartHtml = '<div class="section-block"><div class="section-title">Контрагент</div><div class="extracted-grid">' +
      (ex.company  ? '<div class="extracted-item"><div class="extracted-label">Компания</div><div class="extracted-value">'+ERP.esc(ex.company)+'</div></div>' : '') +
      (ex.contact  ? '<div class="extracted-item"><div class="extracted-label">Контакт</div><div class="extracted-value">'+ERP.esc(ex.contact)+'</div></div>' : '') +
      (ex.deadline ? '<div class="extracted-item"><div class="extracted-label">Срок</div><div class="extracted-value">'+ERP.esc(ex.deadline)+'</div></div>' : '') +
      (ex.currency ? '<div class="extracted-item"><div class="extracted-label">Валюта</div><div class="extracted-value">'+ERP.esc(ex.currency)+'</div></div>' : '') +
    '</div></div>';
  }

  /* -- ai drafts -- */
  var draftsHtml = '';
  if (currentDrafts.length) {
    draftsHtml = '<div class="section-block"><div class="section-title">Варианты ответа ('+currentDrafts.length+') — нажмите для выбора</div><div class="drafts-list">' +
      currentDrafts.map(function(d, i) {
        return '<div class="draft-card" id="draft-'+i+'" onclick="selectDraft('+i+')">' +
          '<div class="draft-strategy">'+ERP.esc(d.strategy || ('Вариант '+(i+1)))+'</div>' +
          '<div class="draft-preview">'+ERP.esc(d.body||'')+'</div>' +
        '</div>';
      }).join('') + '</div></div>';
  }

  /* -- action buttons for header -- */
  var rfqBtn = msg.aiSuggestRfq
    ? '<button class="btn btn-success btn-sm" onclick="createRfqFromEmail(\''+ERP.esc(msg.id)+'\')">📋 КП из письма</button>'
    : '';

  /* -- history block -- */
  var historyHtml = '';
  if (body.quoted) {
    var hblocks = parseHistoryBlocks(body.quoted);
    var blocksHtml = hblocks.map(function(b, idx) {
      var bodyText = b.bodyLines.join('\n').trim();
      var needExpand = bodyText.split('\n').filter(function(l){ return l.trim(); }).length > 5;
      return '<div class="hist-msg">' +
        (b.header ? '<div class="hist-msg-from">'+ERP.esc(b.header)+'</div>' : '') +
        '<div class="hist-msg-body" id="hb-'+idx+'">'+(bodyText ? ERP.esc(bodyText) : '')+'</div>' +
        (needExpand ? '<span class="hist-msg-expand" onclick="toggleHistBlock('+idx+')">Показать полностью ▾</span>' : '') +
      '</div>';
    }).join('');
    var msgCount = hblocks.filter(function(b){ return b.header; }).length;
    historyHtml =
      '<div class="history-toggle" id="hist-toggle" onclick="toggleHistory()">' +
        '<span class="history-toggle-icon">▶</span>' +
        '<span>История переписки' + (msgCount > 0 ? ' · ' + msgCount + ' сообщ.' : '') + '</span>' +
      '</div>' +
      '<div class="history-body" id="hist-body">' + blocksHtml + '</div>';
  }

  /* -- assemble panel -- */
  panel.innerHTML =
    /* Zone 1: sticky header */
    '<div class="detail-header">' +
      '<div class="detail-subject">'+ERP.esc(msg.subject||'(без темы)')+'</div>' +
      '<div class="detail-meta-row">' +
        '<span class="detail-meta-from">От: <strong>'+ERP.esc(msg.fromName||msg.fromAddress||'—')+'</strong>' +
          (msg.fromName && msg.fromAddress ? ' &lt;'+ERP.esc(msg.fromAddress)+'&gt;' : '') + '</span>' +
        '<span class="detail-meta-time">'+fmtFull(msg.receivedAt)+'</span>' +
      '</div>' +
      '<div class="detail-badges">' +
        intentBadge(msg.aiIntent) + priorityBadge(msg.aiPriority) +
        (confidence ? '<span class="badge b-secondary">AI '+confidence+'%</span>' : '') +
        statusBadge(msg.status) +
      '</div>' +
      '<div class="detail-hdr-actions">' +
        rfqBtn +
        '<button class="btn btn-danger btn-sm" onclick="archiveMail(\''+ERP.esc(msg.id)+'\')">📁 В архив</button>' +
        '<button class="btn btn-secondary btn-sm btn-reanalyze" id="reanalyze-btn" onclick="reanalyzeEmail(\''+ERP.esc(msg.id)+'\')">' +
          '↻ '+(confidence ? 'Обновить анализ' : 'Анализировать') +
        '</button>' +
      '</div>' +
    '</div>' +

    /* Zone 2: scrollable content */
    '<div class="detail-scroll" id="detail-scroll">' +
      (msg.aiSummary && confidence > 0
        ? '<div class="section-block"><div class="section-title">AI-резюме</div><div class="summary-text">'+ERP.esc(msg.aiSummary)+'</div></div>'
        : '') +
      '<div class="section-block">' +
        '<div class="section-title">Текст письма</div>' +
        (body.main
          ? (hasHtmlContent(body.main)
              ? '<div class="body-main body-html">'+sanitizeEmailHtml(body.main)+'</div>'
              : '<div class="body-main">'+ERP.esc(body.main)+'</div>')
          : '<div class="body-main" style="color:var(--txts)">(текст не извлечён)</div>') +
        historyHtml +
      '</div>' +
      attachHtml + itemsHtml + counterpartHtml + draftsHtml +
    '</div>' +

    /* Zone 3: sticky reply editor */
    '<div class="reply-editor">' +
      '<div class="reply-editor-label">Редактор ответа</div>' +
      '<textarea id="reply-textarea" placeholder="Выберите вариант выше или введите текст ответа..."></textarea>' +
      '<div class="reply-actions">' +
        '<button class="btn btn-primary btn-sm" onclick="sendReply(\''+ERP.esc(msg.id)+'\',\''+ERP.esc(msg.messageId||'')+'\')">✉ Отправить</button>' +
        '<button class="btn btn-secondary btn-sm" onclick="clearReply()">✕ Очистить</button>' +
        '<span style="flex:1"></span>' +
        '<span style="font-size:11px;color:var(--txts)" id="reply-char-count"></span>' +
      '</div>' +
    '</div>';

  /* char counter */
  var ta = document.getElementById('reply-textarea');
  if (ta) {
    ta.addEventListener('input', function() {
      var cc = document.getElementById('reply-char-count');
      if (cc) cc.textContent = ta.value.length > 0 ? ta.value.length + ' симв.' : '';
    });
  }
}

function toggleHistory() {
  var toggle = document.getElementById('hist-toggle');
  var body   = document.getElementById('hist-body');
  if (!toggle || !body) return;
  var open = body.classList.toggle('open');
  toggle.classList.toggle('open', open);
}

function toggleHistBlock(idx) {
  var el  = document.getElementById('hb-' + idx);
  var btn = el ? el.nextElementSibling : null;
  if (!el) return;
  el.classList.toggle('expanded');
  if (btn) btn.textContent = el.classList.contains('expanded') ? 'Свернуть ▴' : 'Показать полностью ▾';
}

function clearReply() {
  var ta = document.getElementById('reply-textarea');
  if (ta) { ta.value = ''; ta.focus(); }
  document.querySelectorAll('.draft-card').forEach(function(c){ c.classList.remove('on'); });
  var cc = document.getElementById('reply-char-count');
  if (cc) cc.textContent = '';
}

/* ── SELECT DRAFT ───────────────────────────────────────── */
function selectDraft(index) {
  document.querySelectorAll('.draft-card').forEach(function(c, i){ c.classList.toggle('on', i === index); });
  var ta = document.getElementById('reply-textarea');
  if (ta && currentDrafts[index]) {
    ta.value = currentDrafts[index].body || '';
    ta.focus();
    ta.dispatchEvent(new Event('input'));
    ERP.toast('Вариант вставлен в редактор', 'success');
  }
}

/* ── REANALYZE ──────────────────────────────────────────── */
async function reanalyzeEmail(id) {
  var btn = document.getElementById('reanalyze-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Анализ...'; }
  try {
    var r = await ERP.authFetch(AI_API + '/api/email-copilot/analyze/' + id, { method: 'POST' });
    if (!r.ok) throw new Error('Ошибка анализа: ' + r.status);
    ERP.toast('Анализ завершён', 'success');
    await loadMessages();
    var updated = messages.find(function(m){ return m.id === id; });
    if (updated) renderDetail(updated);
  } catch(e) {
    ERP.toast(e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '↻ Переанализировать'; }
  }
}

/* ── SEND REPLY ─────────────────────────────────────────── */
async function sendReply(id, messageId) {
  var ta = document.getElementById('reply-textarea');
  var body = ta ? ta.value.trim() : '';
  if (!body) { ERP.toast('Введите текст ответа', 'error'); return; }
  var btn = document.querySelector('.reply-actions .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Отправка...'; }
  try {
    var msg = messages.find(function(m){ return m.id === id; });
    var r = await ERP.authFetch(AI_API + '/api/email-copilot/reply', {
      method: 'POST',
      body: JSON.stringify({ messageId: messageId, replyBody: body, sentBy: 'manager' }),
    });
    if (!r.ok) throw new Error('Ошибка отправки');

    // Log reply in ERP CRM and auto-transition order status
    try {
      var token = localStorage.getItem('erp_token');
      var erpR = await fetch('/api/email-copilot/log-reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          messageId: messageId,
          replyBody: body,
          subject:   msg ? msg.subject : '',
        }),
      });
      if (erpR.ok) {
        var erpData = await erpR.json();
        if (erpData.statusChanged && erpData.orderNumber) {
          ERP.toast('Заказ ' + erpData.orderNumber + ' переведён в КП', 'success');
        }
      }
    } catch(_) { /* ERP logging is best-effort */ }

    ERP.toast('Ответ отправлен', 'success');
    clearReply();
    loadMessages();
  } catch(e) {
    ERP.toast(e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '✉ Отправить'; }
  }
}

/* ── ARCHIVE ────────────────────────────────────────────── */
async function archiveMail(id) {
  try {
    var r = await ERP.authFetch(AI_API + '/api/email-copilot/archive/' + id, { method: 'POST' });
    if (!r.ok) throw new Error('Ошибка');
    ERP.toast('Письмо перемещено в архив', 'success');
    selectedId = null;
    var panel = document.getElementById('detail-panel');
    panel.innerHTML = '<div class="detail-empty">Выберите письмо из списка</div>';
    loadMessages();
  } catch(e) { ERP.toast(e.message, 'error'); }
}

/* ── CREATE RFQ ─────────────────────────────────────────── */
async function createRfqFromEmail(id) {
  var msg = messages.find(function(m){ return m.id === id; });
  if (!msg) return ERP.toast('Письмо не найдено', 'error');

  var title = prompt('Название объекта / проекта для КП:', msg.subject || '');
  if (!title) return;

  try {
    var extractedItems = (msg.aiExtracted && msg.aiExtracted.items) ? msg.aiExtracted.items : [];

    // Всегда строим fallback из сырых позиций — они попадут в расчёт даже без нормализации
    function buildFallback(items) {
      return items.map(function(item) {
        return {
          normalization_result_id:   null,
          raw_text:                  item.name || item.description || item.raw_text || '',
          confirmed_material_erp_id: null,
          confirmed_material_name:   null,
          quantity:                  item.qty || item.quantity || 1,
          unit:                      item.unit || 'м',
          confidence:                0,
          match_method:              'no_match',
          status:                    'no_match',
          assembly_name:             'Основной узел',
        };
      });
    }

    var normalizationResults = extractedItems.length ? buildFallback(extractedItems) : [];

    // Попытка нормализации — улучшаем fallback если AI Polygon доступен
    if (extractedItems.length) {
      try {
        var normResp = await ERP.authFetch('/api/normalization/match', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            items: extractedItems.map(function(item) {
              return {
                extraction_item_id: item.id || null,
                raw_text:           item.name || item.description || item.raw_text || '',
                quantity:           item.qty  || item.quantity    || 1,
                unit:               item.unit || 'м',
                supplier_name:      (msg.aiExtracted && msg.aiExtracted.company) || null,
              };
            })
          })
        });
        if (normResp.ok) {
          var normData = await normResp.json();
          var mapped = (normData.results || []).map(function(r, i) {
            var bestCandidate = r.candidates && r.candidates[0];
            var autoConfirm   = r.best_score >= 0.85 && bestCandidate;
            var src = extractedItems[i] || {};
            return {
              normalization_result_id:   r.normalization_result_id || null,
              raw_text:                  r.raw_text || src.name || src.description || '',
              confirmed_material_erp_id: autoConfirm ? bestCandidate.material_erp_id : null,
              confirmed_material_name:   autoConfirm ? bestCandidate.name : null,
              quantity:                  src.qty || src.quantity || 1,
              unit:                      src.unit || 'м',
              confidence:                r.best_score || 0,
              match_method:              r.match_method || null,
              status:                    autoConfirm ? 'confirmed' : (r.match_method === 'no_match' ? 'no_match' : 'pending'),
              assembly_name:             'Основной узел',
            };
          });
          if (mapped.length) normalizationResults = mapped;
        }
      } catch(ne) {
        console.warn('[ERP] Normalization unavailable, using raw items as no_match:', ne.message);
      }
    }

    // Создать заказ
    var token = localStorage.getItem('erp_token');
    var r = await fetch('/api/orders/from-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        messageId:   id,
        title:       title,
        fromAddress: msg.fromAddress || '',
        fromName:    msg.fromName    || '',
        subject:     msg.subject     || '',
        normalizationResults: normalizationResults.length ? normalizationResults : undefined,
      }),
    });
    var data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Ошибка');

    var label = data.created ? 'Заказ создан' : 'Заказ уже существует';
    var posMsg = normalizationResults.length ? ' · ' + normalizationResults.length + ' позиций' : '';
    ERP.toast(label + ' — ' + data.orderNumber + posMsg, 'success');
    if (data.orderId && confirm(label + ': ' + data.orderNumber + '\n\nОткрыть в калькуляторе КП?'))
      window.location.href = 'simulator.html?orderId=' + data.orderId;
  } catch(e) { ERP.toast(e.message, 'error'); }
}

/* ── POLL MAIL ──────────────────────────────────────────── */
async function pollMail() {
  try {
    var r = await ERP.authFetch(AI_API + '/api/email-copilot/poll', { method: 'POST' });
    var data = await r.json();
    if (!r.ok) {
      var msg = data.message || data.error || ('Ошибка ' + r.status);
      ERP.toast('IMAP ошибка: ' + msg, 'error');
      return;
    }
    var n = data.received != null ? data.received : (data.newCount != null ? data.newCount : (data.count || 0));
    ERP.toast('Получено: ' + n + ' новых', n > 0 ? 'success' : '');
    updateLastUpdate();
    loadMessages();
  } catch(e) { ERP.toast('Сервис недоступен', 'error'); }
}

function updateLastUpdate() {
  var el = document.getElementById('last-update');
  if (el) el.textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
}

/* ── LEFT PANEL RESIZE ──────────────────────────────────── */
function startPanelResize(e) {
  e.preventDefault();
  var panel = document.querySelector('.list-panel');
  var handle = e.currentTarget;
  var x0 = e.clientX;
  var w0 = panel.offsetWidth;
  handle.classList.add('dragging');
  function onMove(ev) {
    var w = Math.max(200, Math.min(560, w0 + ev.clientX - x0));
    panel.style.width = w + 'px';
  }
  function onUp() {
    handle.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    try { localStorage.setItem('erp_mail_panel_w', panel.offsetWidth); } catch(_) {}
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

/* ── INIT ───────────────────────────────────────────────── */
(function restorePanelWidth() {
  try {
    var w = parseInt(localStorage.getItem('erp_mail_panel_w'));
    if (w >= 200 && w <= 560) document.querySelector('.list-panel').style.width = w + 'px';
  } catch(_) {}
})();

loadMessages();
</script>
