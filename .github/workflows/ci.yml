name: CI - Build & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # Detect which services changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      erp: ${{ steps.changes.outputs.erp }}
      ai: ${{ steps.changes.outputs.ai }}
      shared: ${{ steps.changes.outputs.shared }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            erp:
              - 'apps/erp-web/**'
              - 'packages/**'
              - 'pnpm-workspace.yaml'
            ai:
              - 'services/ai-polygon/**'
              - 'packages/**'
              - 'pnpm-workspace.yaml'
            shared:
              - 'packages/**'

  # Check ERP code
  check-erp:
    needs: detect-changes
    if: needs.detect-changes.outputs.erp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check ERP files exist
        run: |
          echo "✓ Checking ERP structure..."
          ls -la apps/erp-web/
          test -f apps/erp-web/server.js
          test -f apps/erp-web/package.json
          echo "✓ ERP files OK"

  # Check AI service
  check-ai:
    needs: detect-changes
    if: needs.detect-changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check AI service structure
        run: |
          echo "✓ Checking AI service..."
          ls -la services/ai-polygon/
          test -f services/ai-polygon/package.json
          test -f services/ai-polygon/nest-cli.json
          echo "✓ AI service OK"

  # Lint & Format check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: |
          echo "✓ CI checks passed"
